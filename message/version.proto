syntax = "proto3";

message VersionFile {
    uint64 date = 1 [jstype = JS_NUMBER];
    uint32 version_number = 2;
    optional PackageInfo windows = 3;
    optional PackageInfo linux = 4;
    message PackageInfo {
        uint32 size = 3;
        uint32 zip_size = 4;
        optional bytes zip_info_hash_v1 = 5;
        optional bytes zip_info_hash_v2 = 6;
        repeated string vf_web_seeds = 7;
        repeated string zip_web_seeds = 8;
        repeated string zip_torrent_web_seeds = 9;
    }
    optional string releases_url = 5;
    //repeated string replacements = 5;
}
