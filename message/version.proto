syntax = "proto3";

message VersionFile {
    uint64 date = 1 [jstype = JS_NUMBER];
    uint32 version = 2;
    uint32 size = 3;
    uint32 zip_size = 4;
    bytes zip_info_hash_v1 = 5;
    bytes zip_info_hash_v2 = 6;
    repeated string zip_web_seeds = 7;
    repeated string vf_web_seeds = 8;
    optional string releases_url = 9;
}
